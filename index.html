<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPACE SHOOTER</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="intro-ship">
      <svg viewBox="-60 0 120 30" width="120" height="30">
        <!-- White speed stripes -->
        <line x1="-50" y1="11" x2="2" y2="11" class="trail-line line1" />
        <line x1="-60" y1="15" x2="-2" y2="15" class="trail-line line2" />
        <line x1="-50" y1="19" x2="2" y2="19" class="trail-line line3" />

        <!-- Spaceship -->
        <polygon points="5,15 18,10 15,15 18,20" fill="rgb(218, 78, 27)" />
        <polygon points="15,5 30,15 15,25" fill="#00f5ff" />
        <polygon points="18,10 50,15 18,20" fill="#1e293b" />
        <ellipse cx="34" cy="15" rx="6" ry="3" fill="#ffffff" />
      </svg>
    </div>
    <div id="overlay">
      <h2 id="overlayTitle">SPACE SHOOTER</h2>
      <p id="overlayMsg">
        HANCKURKAN SEMUA ALIEN SEBELUM MEREKEA MENYENTUH BUMI!
      </p>
      <div id="finalScore" class="big-score hidden">0</div>
      <p id="keterangan-main">
        ← → untuk bergerak &nbsp;|&nbsp; SPASI untuk tembak
      </p>
      <button id="startBtn">MULAI</button>
      <div id="anggota-kelompok">
        KELOMPOK:<br />
        <span>NASHA SATRIA LAGA</span> &bull;
        <span>MUHAMMAD NAUFAL AYASY</span> &bull;
        <span>SUGIH MAULANA YUSUF</span>
      </div>
    </div>

    <div id="title">SPACE SHOOTER</div>
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">SKOR</span
        ><span class="hud-value" id="scoreVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">NYAWA</span
        ><span class="hud-value" id="livesVal">♥♥♥</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LEVEL</span
        ><span class="hud-value" id="levelVal">1</span>
      </div>
      <div class="hud-item" id="ai-hud">
        <span class="hud-label">🧠 AI</span
        ><span class="hud-value" id="aiVal">0%</span>
      </div>
    </div>
    <canvas id="c"></canvas>
    <div id="controls">
      ← → bergerak &nbsp;|&nbsp; SPASI tembak &nbsp;|&nbsp; P pause
    </div>

    <div id="touch-controls">
      <button class="t-btn" id="leftBtn">◀</button>
      <button class="t-btn" id="fireBtn">FIRE</button>
      <button class="t-btn" id="rightBtn">▶</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
